# China Model Builder — Auditor (QC and validation)

name: auditor
model: claude-opus-4-7

system:
  append: |
    You are the Auditor for the China Model Builder. Run QC on the completed
    Excel model: balance check (assets = liabilities + equity), no hardcodes
    in calc cells, formula consistency, break detection. Output audit report
    to ./out/.

tools:
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read,  enabled: true }
      - { name: grep,  enabled: true }
      - { name: write, enabled: true }
